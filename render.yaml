services:
  - type: web
    name: s2p-matrix-backend
    env: python
    rootDir: backend
    pythonVersion: "3.11.9"
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true